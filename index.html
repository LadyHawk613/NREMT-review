<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NREMT Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen">

    <h1>NREMT Simulator</h1>

    <div class="grid">

      <div class="card">
        <h2>Start Practice</h2>
        <button onclick="startPractice()">Random Questions</button>
      </div>

      <div class="card">
        <h2>Start Exam</h2>
        <button onclick="startExam()">75 Question Exam</button>
      </div>

      <div class="card">
        <h2>Weak Areas</h2>
        <div id="weakAreas"></div>
      </div>

      <div class="card">
        <h2>Category Performance</h2>
        <div id="categoryStats"></div>
      </div>

    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz" class="screen hidden">

    <div class="topbar">
      <div id="modeLabel"></div>
      <div id="progress"></div>
      <div id="timer"></div>
    </div>

    <div id="scenario"></div>
    <div id="question"></div>

    <div id="list"></div>

    <button onclick="submitAnswer()">Submit</button>
    <button onclick="nextQuestion()">Next</button>

    <div id="feedback"></div>
  </div>

</div>

<script src="questions.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>

</body>
</html>
